<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050507">
    <title>FloodGate // Command Center</title>

    <!-- Dependencies -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <!-- Slim Sidebar -->
        <nav class="sidebar">
            <div class="brand-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>

            <div class="nav-links">
                <a href="#" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span class="nav-tooltip">Dashboard</span>
                </a>

                <a href="proxies.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12h20"></path>
                        <path d="M2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6"></path>
                        <path d="M2 12V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v6"></path>
                        <path d="M12 2v20"></path>
                    </svg>
                    <span class="nav-tooltip">Proxies</span>
                </a>

                <a href="#" class="nav-item" id="unique-victims-card">
                    <div style="position: relative;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <!-- Badge handled by JS but positioning needs care. Using absolute span inside nav-item might be better if I update JS, but let's stick to ID -->
                    </div>
                    <!-- Hidden number for JS to update, using style to hide if not needed or make it a small dot -->
                    <span id="unique-victims" style="display: none;">0</span>
                    <span class="nav-tooltip">Victims</span>
                </a>

                <a href="admin.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2.69l5.74 5.88-5.74 5.88-5.74-5.88z"></path>
                        <path d="M7.74 14.47l-5.74 5.88 5.74 5.88 5.74-5.88z"></path>
                        <path d="M16.26 14.47l-5.74 5.88 5.74 5.88 5.74-5.88z"></path>
                    </svg>
                    <span class="nav-tooltip">Admin</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="page-title">
                    <h1>Overview</h1>
                </div>

                <div class="header-stats">
                    <div class="stat-pill" title="System Uptime">
                        <span class="status-dot"></span>
                        <span id="uptime">00:00:00</span>
                    </div>

                    <div class="stat-pill status-badge" style="border: none; background: transparent; padding: 0;">
                        <!-- JS updates this class/content for Online/Offline status -->
                        <!-- Keeping the status-badge class for JS compatibility, but I might need to style it -->
                        <span class="status-text" style="display:none">Online</span>
                    </div>

                    <div class="stat-pill" title="Network Load">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                        </svg>
                        <span id="bandwidth-total">0 MB</span>
                        <span id="bandwidth-upload"
                            style="font-size: 10px; color: var(--text-faint); margin-left: 5px;">0</span>
                        <span id="bandwidth-download"
                            style="font-size: 10px; color: var(--text-faint); margin-left: 5px;">0</span>
                    </div>

                    <div style="display: flex; gap: 12px; margin-left: 12px;">
                        <button id="btn-stop-all" class="btn btn-danger">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="15" y1="9" x2="9" y2="15"></line>
                                <line x1="9" y1="9" x2="15" y2="15"></line>
                            </svg>
                            Stop All
                        </button>
                        <button id="btn-add-victim" class="btn btn-primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            New Attack
                        </button>
                    </div>
                </div>
            </header>

            <div class="dashboard-view">
                <div class="grid-layout">

                    <!-- Main Chart -->
                    <div class="card chart-card">
                        <div class="chart-header">
                            <div>
                                <div class="chart-title">Global Request Rate</div>
                                <div class="chart-value" id="current-rps-display">0 RPS</div>
                            </div>
                        </div>
                        <div class="chart-canvas-wrapper">
                            <canvas id="trafficChart"></canvas>
                        </div>
                    </div>

                    <!-- Side Metrics Stack -->
                    <div class="metrics-stack">
                        <div class="metric-card">
                            <div class="metric-label">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)"
                                    stroke-width="2">
                                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                                </svg>
                                Active Attacks
                            </div>
                            <div class="metric-value" id="active-attacks">0</div>
                        </div>

                        <div class="metric-card">
                            <div class="metric-label">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)"
                                    stroke-width="2">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                Success Rate
                            </div>
                            <div class="metric-value text-success" id="success-rate">0%</div>
                        </div>

                        <div class="metric-card">
                            <div class="metric-label">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)"
                                    stroke-width="2">
                                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                                    <line x1="1" y1="10" x2="23" y2="10"></line>
                                </svg>
                                Queue Load
                            </div>
                            <div class="metric-value text-cyan" id="queue-length">0</div>
                        </div>
                    </div>

                    <!-- Bottom Stats -->
                    <div class="card metric-card">
                        <div class="metric-label">Total Messages Sent</div>
                        <div class="metric-value" id="messages-sent">0</div>
                    </div>

                    <div class="card metric-card">
                        <div class="metric-label">Failed Requests</div>
                        <div class="metric-value text-danger" id="failed-requests">0</div>
                    </div>

                    <div class="card metric-card">
                        <div class="metric-label">Available Proxies</div>
                        <div class="metric-value" id="proxy-count">0</div>
                        <div id="proxy-status" style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">Ready
                        </div>
                    </div>

                    <div class="card metric-card" style="flex-direction: column; gap: 8px; align-items: stretch; justify-content: center;">
                        <button id="btn-fetch-proxies" class="btn"
                            style="background: var(--bg-hover); border: 1px solid var(--border-subtle); width: 100%;">
                            Pull New Proxies
                        </button>
                        <button id="btn-refresh-proxies" class="btn"
                            style="background: var(--bg-hover); border: 1px solid var(--border-subtle); width: 100%;">
                            Refresh Counter
                        </button>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Add Victim Modal -->
    <div id="add-victim-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Launch New Attack</h3>
                <button class="modal-close close-add-modal">&times;</button>
            </div>
            <form id="attack-form">
                <div class="form-group">
                    <label>Target Username / URL</label>
                    <input type="text" id="target-input" class="input-field" placeholder="e.g. username" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>RPS Limit</label>
                        <input type="number" id="rps-input" class="input-field" value="50" min="1" max="500">
                    </div>
                    <div class="form-group">
                        <label>Duration (Seconds)</label>
                        <input type="number" id="duration-input" class="input-field" value="60" min="10" max="3600">
                    </div>
                </div>

                <div class="form-group">
                    <label>Message Content (Split by |)</label>
                    <textarea id="message-input" class="input-field" rows="4"
                        placeholder="spam test | hello world"></textarea>
                </div>

                <button type="submit" id="btn-launch" class="btn btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 12px;">
                    Initialize Attack Sequence
                </button>
            </form>
        </div>
    </div>

    <!-- Victim Details Modal -->
    <div id="victim-modal" class="modal-overlay">
        <div class="modal-content lg">
            <div class="modal-header">
                <h3>Victim Database</h3>
                <button class="modal-close close-modal">&times;</button>
            </div>

            <div class="split-layout">
                <!-- Sidebar List -->
                <div class="sidebar-list">
                    <div class="list-header">
                        <input type="text" id="victim-search" class="input-field" placeholder="Search victims...">
                    </div>
                    <div id="victim-list" class="victim-scroller">
                        <!-- Items injected via JS -->
                    </div>
                </div>

                <!-- Main Details -->
                <div class="details-panel">
                    <div class="details-header">
                        <h2 id="selected-victim-name" style="font-size: 18px; margin-bottom: 0;">Select a victim</h2>
                        <!-- Dynamic Header Content injected here by existing JS logic -->
                        <!-- We need to ensure the JS finds 'v-header-container' if it tries to inject -->
                    </div>

                    <div id="victim-messages" style="display: flex; flex-direction: column; height: 100%;">
                        <!-- Need container for messages that matches JS expectations -->
                        <!-- JS uses 'message-list' ul -->
                        <ul id="message-list" class="message-feed">
                            <!-- Messages injected here -->
                        </ul>

                        <!-- Note input from original design, assuming functionality needed -->
                        <div style="padding: 16px; border-top: 1px solid var(--border-subtle);">
                            <div style="display: flex; gap: 8px;">
                                <input id="victim-note" class="input-field" placeholder="Add note..."
                                    style="font-size: 12px;">
                                <button id="save-note-btn" class="btn btn-primary"
                                    style="padding: 8px 16px;">Save</button>
                            </div>
                            <span id="note-save-status"
                                style="font-size: 11px; margin-top: 4px; display: block;"></span>
                        </div>
                    </div>

                    <!-- JS looks for 'victim-messages' container to hide/show things sometimes -->
                </div>
            </div>
        </div>
    </div>

    <script src="bg.js"></script>
    <script src="script.js?v=21"></script>
</body>

</html>
