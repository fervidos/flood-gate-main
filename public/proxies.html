<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloodGate // Proxy Manager</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .proxy-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 0.9em;
        }

        .proxy-table th,
        .proxy-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border-subtle);
            text-align: left;
        }

        .proxy-table th {
            color: var(--text-muted);
            font-weight: 600;
        }

        .proxy-table tr:hover {
            background: var(--bg-hover);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .status-working {
            background: rgba(var(--accent-green-rgb), 0.1);
            color: var(--accent-green);
        }

        .status-failed {
            background: rgba(var(--accent-red-rgb), 0.1);
            color: var(--accent-red);
        }
        
        .text-warning {
            color: #f1c40f;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: var(--bg-secondary);
            margin: 10% auto;
            padding: 24px;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            width: 50%;
            max-width: 600px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .close {
            color: var(--text-muted);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: var(--text-main);
            text-decoration: none;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        
        .page-btn {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            border-radius: 4px;
            cursor: pointer;
        }
        
        .page-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="brand-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>

            <div class="nav-links">
                <a href="index.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span class="nav-tooltip">Dashboard</span>
                </a>

                <a href="proxies.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12h20"></path>
                        <path d="M2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6"></path>
                        <path d="M2 12V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v6"></path>
                        <path d="M12 2v20"></path>
                    </svg>
                    <span class="nav-tooltip">Proxies</span>
                </a>

                <a href="admin.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2.69l5.74 5.88-5.74 5.88-5.74-5.88z"></path>
                        <path d="M7.74 14.47l-5.74 5.88 5.74 5.88 5.74-5.88z"></path>
                        <path d="M16.26 14.47l-5.74 5.88 5.74 5.88 5.74-5.88z"></path>
                    </svg>
                    <span class="nav-tooltip">Admin</span>
                </a>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <div class="page-title">
                    <h1>Proxy Manager</h1>
                </div>
                <div class="header-stats">
                    <div class="stat-pill">
                         <span id="total-proxies">0</span> Proxies
                    </div>
                </div>
            </header>

            <div class="dashboard-view" style="padding: 32px;">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <div style="display: flex; gap: 12px;">
                            <input type="text" id="search-input" placeholder="Search proxies..." class="input-field" style="width: 250px;">
                            <button id="btn-search" class="btn btn-secondary">Search</button>
                        </div>
                        <div style="display: flex; gap: 12px;">
                            <button id="btn-delete-selected" class="btn btn-danger" disabled>Delete Selected</button>
                            <button id="btn-add-modal" class="btn btn-primary">Add Proxies</button>
                        </div>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="proxy-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="select-all"></th>
                                    <th>Host</th>
                                    <th>Port</th>
                                    <th>Type</th>
                                    <th>Auth</th>
                                    <th>Status</th>
                                    <th>Fail Count</th>
                                    <th>Last Checked</th>
                                </tr>
                            </thead>
                            <tbody id="proxy-list">
                                <!-- Proxies will be injected here -->
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination">
                        <!-- Pagination buttons -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Proxies Modal -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add Proxies</h2>
            <p style="color: var(--text-muted); margin-bottom: 12px;">Enter one proxy per line. Format: <code>host:port</code> or <code>host:port:user:pass</code></p>
            <textarea id="proxy-input" class="input-field" style="height: 200px; font-family: monospace;" placeholder="1.2.3.4:8080&#10;5.6.7.8:1080:user:pass"></textarea>
            <div style="margin-top: 20px; text-align: right;">
                <button id="btn-cancel-add" class="btn btn-secondary">Cancel</button>
                <button id="btn-confirm-add" class="btn btn-primary">Add Proxies</button>
            </div>
            <div id="add-result" style="margin-top: 10px; font-size: 0.9em;"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="proxies.js"></script>
</body>
</html>
